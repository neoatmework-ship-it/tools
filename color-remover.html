<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%97%91%EF%B8%8F%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Remover | Tools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --bg-card: rgba(20, 20, 25, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --accent: #a78bfa;
            --text: #f0eef5;
            --text-muted: #8888a0;
            --target: #04F404;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 60px;
        }

        header {
            width: 100%;
            max-width: 900px;
            padding: 50px 20px 30px;
            text-align: center;
        }

        .back {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 20px;
        }

        .back:hover {
            color: var(--text);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .target-swatch {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .swatch-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--target);
            box-shadow: 0 0 8px #04F404aa;
        }

        .main-area {
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: var(--bg-card);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(167, 139, 250, 0.05);
        }

        .drop-zone p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .drop-zone .big-icon {
            font-size: 3rem;
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 30px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .ctrl-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 120px;
        }

        .ctrl-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .ctrl-group input[type="range"] {
            width: 160px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .ctrl-group .val {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
        }

        .color-pick-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-pick-row input[type="color"] {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            padding: 2px;
            background: none;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-left: auto;
        }

        .btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #c084fc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .preview-area {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .preview-area.active {
            display: block;
        }

        .preview-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .preview-pane {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .preview-pane:first-child {
            border-right: 1px solid var(--border);
        }

        .preview-pane canvas,
        .preview-pane img {
            max-width: 100%;
            max-height: 320px;
            border-radius: 8px;
            /* Checkered background to show transparency */
            background-color: #fff;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }

        .preview-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .stats-bar {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 20px;
        }

        .stats-bar span.hi {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="back">← Developer Tools Hub</a>
        <h1>🗑️ Color Remover</h1>
        <p class="subtitle">Remove a specific color from any image — makes matching pixels transparent.</p>
        <div class="target-swatch">
            <div class="swatch-dot"></div>
            Default target: #04F404 (bright green)
        </div>
    </header>

    <div class="main-area">
        <!-- Drop Zone -->
        <label class="drop-zone" id="drop-zone" for="file-input">
            <div class="big-icon">📂</div>
            <p><strong>Drop an image here</strong> or click to browse</p>
            <p>Supports PNG, JPG, WEBP, GIF</p>
        </label>
        <input type="file" id="file-input" accept="image/*">

        <!-- Controls -->
        <div class="controls" id="controls">
            <div class="ctrl-group">
                <label>Target Color</label>
                <div class="color-pick-row">
                    <input type="color" id="target-color" value="#04F404">
                    <span class="val" id="color-val">#04F404</span>
                </div>
            </div>

            <div class="ctrl-group">
                <label>Tolerance <span class="val" id="tol-val">40</span></label>
                <input type="range" id="tolerance" min="0" max="255" value="40">
                <span style="font-size:0.7rem;color:var(--text-muted)">0 = exact · 255 = anything</span>
            </div>

            <div class="ctrl-group">
                <label>Feather <span class="val" id="feather-val">0</span></label>
                <input type="range" id="feather" min="0" max="30" value="0">
                <span style="font-size:0.7rem;color:var(--text-muted)">Soften edge pixels</span>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" id="reset-btn" disabled>Reset</button>
                <button class="btn btn-primary" id="apply-btn" disabled>Remove Color</button>
                <button class="btn btn-primary" id="download-btn" disabled>⬇ Download PNG</button>
            </div>
        </div>

        <!-- Preview -->
        <div class="preview-area" id="preview-area">
            <div class="preview-header">
                <span>Preview</span>
                <span id="stats-text"></span>
            </div>
            <div class="preview-grid">
                <div class="preview-pane">
                    <div class="preview-label">Original</div>
                    <canvas id="original-canvas"></canvas>
                </div>
                <div class="preview-pane">
                    <div class="preview-label">Result (transparent background shown as checkerboard)</div>
                    <canvas id="result-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const applyBtn = document.getElementById('apply-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const originalCanvas = document.getElementById('original-canvas');
        const resultCanvas = document.getElementById('result-canvas');
        const previewArea = document.getElementById('preview-area');
        const statsText = document.getElementById('stats-text');
        const targetColorInput = document.getElementById('target-color');
        const toleranceSlider = document.getElementById('tolerance');
        const featherSlider = document.getElementById('feather');
        const colorVal = document.getElementById('color-val');
        const tolVal = document.getElementById('tol-val');
        const featherVal = document.getElementById('feather-val');

        let originalImage = null;
        let originalImageData = null;

        // Drag and drop
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) loadFile(file);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) loadFile(fileInput.files[0]);
        });

        targetColorInput.addEventListener('input', () => {
            colorVal.textContent = targetColorInput.value.toUpperCase();
        });

        toleranceSlider.addEventListener('input', () => tolVal.textContent = toleranceSlider.value);
        featherSlider.addEventListener('input', () => featherVal.textContent = featherSlider.value);

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;

                    // Draw to original canvas
                    originalCanvas.width = img.width;
                    originalCanvas.height = img.height;
                    const ctx = originalCanvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    originalImageData = ctx.getImageData(0, 0, img.width, img.height);

                    previewArea.classList.add('active');
                    applyBtn.disabled = false;
                    resetBtn.disabled = false;
                    downloadBtn.disabled = true;

                    // Auto-apply
                    applyRemoval();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt((r1 - r2) ** 2 + (g1 - g2) ** 2 + (b1 - b2) ** 2);
        }

        function applyRemoval() {
            if (!originalImageData) return;

            const target = hexToRgb(targetColorInput.value);
            const tolerance = parseInt(toleranceSlider.value);
            const feather = parseInt(featherSlider.value);
            const maxDist = Math.sqrt(3 * 255 ** 2);

            const { width, height, data } = originalImageData;
            const resultCtx = resultCanvas.getContext('2d');
            resultCanvas.width = width;
            resultCanvas.height = height;

            const imageData = new ImageData(new Uint8ClampedArray(data), width, height);
            const pixels = imageData.data;
            let removedCount = 0;

            for (let i = 0; i < pixels.length; i += 4) {
                const r = pixels[i];
                const g = pixels[i + 1];
                const b = pixels[i + 2];

                const dist = colorDistance(r, g, b, target.r, target.g, target.b);

                if (dist <= tolerance) {
                    // Exact removal
                    pixels[i + 3] = 0;
                    removedCount++;
                } else if (feather > 0 && dist <= tolerance + feather) {
                    // Feathered edge: partially transparent
                    const alpha = Math.max(0, (dist - tolerance) / feather);
                    pixels[i + 3] = Math.round(pixels[i + 3] * alpha);
                    removedCount++;
                }
            }

            resultCtx.putImageData(imageData, 0, 0);
            downloadBtn.disabled = false;

            const total = width * height;
            const percent = ((removedCount / total) * 100).toFixed(1);
            statsText.innerHTML = `Removed <strong>${removedCount.toLocaleString()}</strong> pixels (${percent}% of ${total.toLocaleString()} total)`;
        }

        applyBtn.addEventListener('click', applyRemoval);

        resetBtn.addEventListener('click', () => {
            if (!originalImageData) return;
            const resultCtx = resultCanvas.getContext('2d');
            resultCanvas.width = originalImage.width;
            resultCanvas.height = originalImage.height;
            resultCtx.putImageData(originalImageData, 0, 0);
            downloadBtn.disabled = true;
            statsText.textContent = '';
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'removed-color.png';
            link.href = resultCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>

</html>
