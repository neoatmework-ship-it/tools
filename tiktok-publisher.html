<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%93%B1%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok API Auto-Publisher | Dev Tools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --bg-card: rgba(20, 20, 28, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2fe;
            --tiktok-pink: #fe2c55;
            --tiktok-cyan: #25f4ee;
            --text: #f0eef5;
            --text-muted: #8888a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(37, 244, 238, 0.05) 0%, transparent 40%),
                radial-gradient(circle at bottom left, rgba(254, 44, 85, 0.05) 0%, transparent 40%);
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            color: var(--text);
            margin-bottom: 8px;
        }

        p.desc {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .step-panel {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .step-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            color: var(--tiktok-cyan);
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"] {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            color: var(--text);
            font-family: monospace;
            width: 100%;
            outline: none;
        }

        input:focus {
            border-color: var(--tiktok-cyan);
        }

        .file-upload {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .file-upload:hover {
            border-color: var(--tiktok-pink);
            background: rgba(254, 44, 85, 0.05);
        }

        .file-upload input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--tiktok-cyan), var(--tiktok-pink));
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .log-container {
            background: #000;
            border-radius: 8px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log {
            color: var(--text-muted);
        }

        .log.success {
            color: #4ade80;
        }

        .log.error {
            color: #f87171;
        }

        .log.info {
            color: var(--tiktok-cyan);
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">← Back to Tools</a>

    <div class="container">
        <div>
            <h1>TikTok Direct API Auto-Publisher</h1>
            <p class="desc">100% Client-Side OAuth 2.0. Secrets stay in memory. CORS is bypassed via public proxy.</p>
        </div>

        <!-- STEP 1 ->
        <div class="step-panel" id="panel-auth">
            <div class="step-header">Step 1: Application Credentials</div>
            <div class="control-group">
                <label>Client Key</label>
                <input type="text" id="client-key" placeholder="aw... (from developer.tiktok.com)">
            </div>
            <div class="control-group">
                <label>Client Secret</label>
                <input type="password" id="client-secret" placeholder="Secret String">
            </div>
            
            <button class="btn primary" id="btn-auth">1. Authorize Application (Opens TikTok)</button>

            <div class="control-group" id="code-group" style="display:none; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <label style="color:var(--tiktok-pink)">Paste Authorization Code from URL Redirect</label>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="auth-code" placeholder="Code=">
                    <button class="btn" id="btn-token" style="white-space:nowrap;">2. Fetch Token</button>
                </div>
            </div>
        </div>

        <!-- STEP 2 ->
        <div class="step-panel" id="panel-upload" style="opacity: 0.3; pointer-events: none;">
            <div class="step-header">Step 2: Publisher Engine</div>
            <div class="file-upload" id="drop-zone">
                <input type="file" id="file-input" accept="video/mp4,video/webm">
                <div id="file-label">🎬 Select Video File</div>
            </div>
            
            <div style="display:flex; gap: 16px;">
                <div class="control-group" style="flex:1;">
                    <label>Post Iterations (Spam Count)</label>
                    <input type="number" id="input-count" value="1" min="1">
                </div>
                <div class="control-group" style="flex:1;">
                    <label>Delay Before Retry (Sec)</label>
                    <input type="number" id="input-delay" value="10" min="0">
                </div>
            </div>

            <button class="btn primary" id="btn-publish" disabled>🚀 Launch Publisher</button>
        </div>

        <div class="log-container" id="log-container"></div>
    </div>

    <script>
        const REDIRECT_URI = "https://www.tiktok.com/"; // Dummy URL for intercepting auth code
        const CORS_PROXY = "https://corsproxy.io/?url=";

        // UI Elements
        const iKey = document.getElementById('client-key');
        const iSecret = document.getElementById('client-secret');
        const iAuthCode = document.getElementById('auth-code');
        const iFile = document.getElementById('file-input');
        const iCount = document.getElementById('input-count');
        const iDelay = document.getElementById('input-delay');
        
        const btnAuth = document.getElementById('btn-auth');
        const btnToken = document.getElementById('btn-token');
        const btnPublish = document.getElementById('btn-publish');
        const fileLabel = document.getElementById('file-label');
        
        const panelUpload = document.getElementById('panel-upload');
        const logBox = document.getElementById('log-container');

        // State Machine
        let accessToken = null;
        let selectedVideo = null;

        function logger(msg, type='log') {
            const el = document.createElement('div');
            el.className = `log ${type}`;
            el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
        }

        logger("Ready to authenticate.");

        // 1. Authorize Sequence (Link to TikTok)
        btnAuth.onclick = () => {
            const cKey = iKey.value.trim();
            if (!cKey) return alert("Client Key required!");

            const authUrl = `https://www.tiktok.com/v2/auth/authorize/?client_key=${cKey}&response_type=code&scope=video.upload&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
            window.open(authUrl, "_blank");
            
            document.getElementById('code-group').style.display = 'block';
            logger("Opened TikTok authorization. Copy the 'code=' from the redirected URL!", 'info');
        };

        // 2. Token Exchange via CORS Proxy
        btnToken.onclick = async () => {
            const cKey = iKey.value.trim();
            const cSec = iSecret.value.trim();
            const code = iAuthCode.value.trim();
            
            if (!cKey || !cSec || !code) return alert("Missing required credentials/code.");

            btnToken.disabled = true;
            logger("Requesting Access Token via Proxy...", 'info');

            const targetUrl = "https://open.tiktokapis.com/v2/oauth/token/";
            const proxiedUrl = CORS_PROXY + encodeURIComponent(targetUrl);

            try {
                const params = new URLSearchParams({
                    client_key: cKey,
                    client_secret: cSec,
                    code: code,
                    grant_type: 'authorization_code',
                    redirect_uri: REDIRECT_URI
                });

                const req = await fetch(proxiedUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                const res = await req.json();

                if (res.access_token) {
                    accessToken = res.access_token;
                    logger("✅ Access Token acquired successfully!", 'success');
                    panelUpload.style.opacity = '1';
                    panelUpload.style.pointerEvents = 'all';
                } else {
                    logger("❌ Token error: " + JSON.stringify(res), 'error');
                }
            } catch (err) {
                logger("❌ Request failed. Proxy block or network error.", 'error');
                console.error(err);
            }
            btnToken.disabled = false;
        };

        // 3. File Selection
        iFile.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedVideo = file;
            fileLabel.textContent = `🎬 ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            btnPublish.disabled = false;
            logger(`Loaded video: ${file.name}`, 'info');
        };

        // 4. Publisher Loop Engine
        btnPublish.onclick = async () => {
            if (!selectedVideo || !accessToken) return;

            const count = parseInt(iCount.value) || 1;
            const delay = parseInt(iDelay.value) || 10;
            const size = selectedVideo.size;

            btnPublish.disabled = true;

            for (let i = 1; i <= count; i++) {
                logger(`--- Iteration ${i} of ${count} ---`, 'info');

                // Step A: Init
                logger("A. Initializing Upload Request...", 'log');
                const initTarget = "https://open.tiktokapis.com/v2/post/publish/video/init/";
                const initProxied = CORS_PROXY + encodeURIComponent(initTarget);
                let uploadUrl = "";
                let publishId = "";

                try {
                    const initReq = await fetch(initProxied, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            post_info: {
                                title: `CLI Auto-Publisher Test #${i}`,
                                privacy_level: "PUBLIC_TO_EVERYONE",
                                disable_duet: false,
                                disable_comment: false,
                                disable_stitch: false
                            },
                            source_info: {
                                source: "FILE_UPLOAD",
                                video_size: size,
                                chunk_size: size,
                                total_chunk_count: 1
                            }
                        })
                    });
                    
                    const initRes = await initReq.json();
                    if (initRes.data && initRes.data.upload_url) {
                        uploadUrl = initRes.data.upload_url;
                        publishId = initRes.data.publish_id;
                        logger("Upload URL acquired.", 'log');
                    } else {
                        logger("❌ Failed to init upload: " + JSON.stringify(initRes), 'error');
                        continue;
                    }
                } catch (e) {
                    logger("❌ Network error during Init.", 'error');
                    continue;
                }

                // Step B: Put Binary Chunk
                logger("B. Transferring video binary data...", 'log');
                try {
                    // We must proxy the PUT upload URL as well to avoid CORS on the binary stream AWS bucket
                    const putProxied = CORS_PROXY + encodeURIComponent(uploadUrl);
                    
                    const putReq = await fetch(putProxied, {
                        method: 'PUT',
                        headers: {
                            'Content-Range': `bytes 0-${size-1}/${size}`,
                            'Content-Type': 'video/mp4'
                        },
                        body: selectedVideo // Direct File Blob
                    });

                    if (putReq.ok) {
                        logger("Video chunk stream successful.", 'log');
                    } else {
                        throw new Error(`PUT Status Failed (${putReq.status})`);
                    }
                } catch (e) {
                    logger("❌ Binary upload transfer failed: " + e.message, 'error');
                    continue;
                }

                logger("✅ Video submitted to TikTok queue!", 'success');

                // Wait for rate limits
                if (i < count) {
                    logger(`Waiting ${delay}s before next post...`, 'log');
                    await new Promise(r => setTimeout(r, delay * 1000));
                }
            }
            logger("🎉 Publishing Sequence Complete!", 'info');
            btnPublish.disabled = false;
        };
    </script>
</body>
</html>
