<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Telemetry | Developer Tools</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --bg-card: rgba(20, 20, 25, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.2);
            --green: #4ade80;
            --blue: #60a5fa;
            --text: #f0eef5;
            --text-muted: #8888a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background glow */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            width: 800px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .header-bg {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 100px;
            color: var(--green);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.5;
            }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .card-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card.wide {
            grid-column: 1 / -1;
            flex-direction: row;
            justify-content: space-between;
        }

        .chart-container {
            width: 100%;
            margin-top: 15px;
        }

        .bar-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .bar-label {
            width: 150px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
        }

        .bar-track {
            flex: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--blue));
            border-radius: 10px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .bar-percent {
            width: 50px;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
        }

        .message-box {
            text-align: center;
            padding: 20px;
            background: rgba(167, 139, 250, 0.05);
            border: 1px dashed rgba(167, 139, 250, 0.3);
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .accent-text {
            color: var(--accent);
            font-weight: 600;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 25%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0.05) 75%);
            background-size: 400% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            color: transparent !important;
        }

        @keyframes loading {
            0% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0 50%;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <div>
                <a href="index.html" class="back-link">← Return to Tools</a>
                <div style="height: 15px;"></div>
                <div class="header-bg">
                    <h1>Beacon Telemetry</h1>
                    <div class="live-indicator">
                        <div class="dot"></div> LIVE NOW
                    </div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-label">Unique Visitors</div>
                <div class="card-value skeleton" id="val-visitors">0000</div>
            </div>
            <div class="card">
                <div class="card-label">Total Clicks</div>
                <div class="card-value skeleton" id="val-clicks">00000</div>
            </div>
            <div class="card">
                <div class="card-label">Currently Active</div>
                <div class="card-value skeleton" id="val-active"
                    style="background: linear-gradient(135deg, #fff 0%, var(--green) 100%); -webkit-background-clip: text;">
                    00</div>
            </div>

            <div class="card wide">
                <div style="flex: 1;">
                    <div class="card-label" style="margin-bottom: 20px;">Top Click Targets</div>

                    <div class="chart-container" id="chart-targets">
                        <!-- Bars injected by JS -->
                    </div>
                </div>
            </div>
        </div>

        <div class="message-box">
            📡 Wait... To make this <span class="accent-text">100% accurate globally</span> across GitHub Pages, we need
            a backend database. Data currently simulated.
        </div>

    </div>

    <script>
        // Simulation Data (Placeholder until backend is connected)
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                // Remove skeletons
                document.querySelectorAll('.skeleton').forEach(el => el.classList.remove('skeleton'));

                // Animate Numbers
                animateValue("val-visitors", 0, 4821, 1500);
                animateValue("val-clicks", 0, 28540, 2000);
                animateValue("val-active", 0, 42, 1000);

                // Render Chart
                const targets = [
                    { name: "div.card (Gallery)", percent: 45 },
                    { name: "h1#wwg-title", percent: 22 },
                    { name: "button.filter-pill", percent: 18 },
                    { name: "a.wwg-nav", percent: 11 },
                    { name: "div.modal-overlay", percent: 4 }
                ];

                const chart = document.getElementById('chart-targets');
                targets.forEach((t, i) => {
                    chart.innerHTML += `
                        <div class="bar-wrap">
                            <div class="bar-label">${t.name}</div>
                            <div class="bar-track">
                                <div class="bar-fill" id="bar-${i}" style="width: 0%;"></div>
                            </div>
                            <div class="bar-percent">${t.percent}%</div>
                        </div>
                    `;
                });

                // Trigger bar animations
                setTimeout(() => {
                    targets.forEach((t, i) => {
                        document.getElementById(`bar-${i}`).style.width = `${t.percent}%`;
                    });
                }, 100);

            }, 800);
        });

        // Number counter animation
        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // easeOutQuart
                const ease = 1 - Math.pow(1 - progress, 4);
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>

</html>
